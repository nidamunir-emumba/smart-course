receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Traces -> Jaeger (OTLP). Jaeger all-in-one exposes OTLP on its 4317 (mapped to host 14317).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Metrics -> Prometheus scrapes this endpoint.
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
