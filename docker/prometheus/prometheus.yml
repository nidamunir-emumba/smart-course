global:
  scrape_interval: 15s

scrape_configs:
  # App metrics exposed by FastAPI (/metrics via prometheus-fastapi-instrumentator).
  - job_name: smartcourse-api
    static_configs:
      - targets: ["api:8000"]

  # Metrics pipeline from the OTel collector (business + runtime metrics).
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
